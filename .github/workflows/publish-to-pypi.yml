name: Build and publish Python distributions to PyPI

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  prepare:
    name: Получение версии релиза
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Проверка репозитория
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Определение версии
        id: get_version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION=$(git describe --tags --abbrev=0)
          fi
          CLEAN_VERSION=${VERSION#v}
          echo "Очищенная версия: $CLEAN_VERSION"
          echo "version=$CLEAN_VERSION" >> "$GITHUB_OUTPUT"

  build-wheels-manylinux:
    name: Сборка под manylinux
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Сборка в контейнере manylinux
        env:
          PACKAGE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          docker run --rm \
            -v "$(pwd)":/workdir \
            -e PACKAGE_VERSION \
            quay.io/pypa/manylinux2014_x86_64 /bin/bash -c '
              set -eux
          
              sed -i "s/^version = .*/version = \"$PACKAGE_VERSION\"/" /workdir/python/pyproject.toml
          
              yum install -y curl
              curl -sL https://go.dev/dl/go1.26.4.linux-amd64.tar.gz | tar -C /usr/local -xzf -
              export PATH=$PATH:/usr/local/go/bin
          
              # Устанавливаем uv и wheel для смены тегов
              /opt/python/cp310-cp310/bin/pip install uv wheel
          
              mkdir -p /workdir/dist
          
              CGO_ENABLED=1 TARGET_ARCH="x86_64" \
              /opt/python/cp310-cp310/bin/uv build --wheel \
                --python "/opt/python/cp310-cp310/bin/python" \
                --out-dir /workdir/dist \
                --package py-fake-useragent \
                /workdir/python

              cd /workdir/dist
              ORIG_WHL=$(ls py_fake_useragent-*-linux_x86_64.whl | head -n 1)

              # Вшиваем системные зависимости через auditwheel
              auditwheel repair "$ORIG_WHL" --plat manylinux2014_x86_64 -w /workdir/dist/
              rm "$ORIG_WHL"

              # Безопасная смена тегов на ABI-agnostic (py3-none) с обновлением метаданных
              for whl_file in py_fake_useragent-*-manylinux*.whl; do
                /opt/python/cp310-cp310/bin/wheel tags --python-tag py3 --abi-tag none "$whl_file"
                rm "$whl_file"
              done
          
              ls -l /workdir/dist/
            '

      - uses: actions/upload-artifact@v6
        with:
          name: python-package-wheel-manylinux
          path: dist/*.whl

  build-wheels-musllinux:
    name: Сборка под musllinux
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Сборка в контейнере musllinux
        env:
          PACKAGE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          docker run --rm \
            -v "$(pwd)":/workdir \
            -e PACKAGE_VERSION \
            quay.io/pypa/musllinux_1_1_x86_64 /bin/bash -c '
              set -eux
          
              sed -i "s/^version = .*/version = \"$PACKAGE_VERSION\"/" /workdir/python/pyproject.toml
          
              apk add --no-cache curl build-base
              curl -sL https://go.dev/dl/go1.25.0.linux-amd64.tar.gz | tar -C /usr/local -xzf -
              export PATH=$PATH:/usr/local/go/bin
          
              /opt/python/cp310-cp310/bin/pip install uv wheel
          
              mkdir -p /workdir/dist
          
              CGO_ENABLED=1 TARGET_ARCH="x86_64" \
              /opt/python/cp310-cp310/bin/uv build --wheel \
                --python "/opt/python/cp310-cp310/bin/python" \
                --out-dir /workdir/dist \
                --package py-fake-useragent \
                /workdir/python

              cd /workdir/dist
              ORIG_WHL=$(ls py_fake_useragent-*-linux_x86_64.whl | head -n 1)

              auditwheel repair "$ORIG_WHL" --plat musllinux_1_1_x86_64 -w /workdir/dist/
              rm "$ORIG_WHL"

              # Безопасная смена тегов
              for whl_file in py_fake_useragent-*-musllinux*.whl; do
                /opt/python/cp310-cp310/bin/wheel tags --python-tag py3 --abi-tag none "$whl_file"
                rm "$whl_file"
              done
            '

      - uses: actions/upload-artifact@v6
        with:
          name: python-package-wheel-musllinux
          path: dist/*.whl

  build-wheels-other:
    name: Сборка под ${{ matrix.platform.plat }}
    needs: prepare
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: windows-latest, plat: win_amd64, arch: amd64 }
          - { os: macos-14, plat: macosx_x86_64, arch: x86_64 }
          - { os: macos-14, plat: macosx_arm64, arch: arm64 }
    steps:
      - uses: actions/checkout@v6

      - name: Установка версии в pyproject.toml
        shell: python
        run: |
          import re
          from pathlib import Path
          path = Path("python/pyproject.toml")
          path.write_text(re.sub(r'^version\s*=\s*".*"', 'version = "${{ needs.prepare.outputs.version }}"', path.read_text(encoding="utf-8"), count=1, flags=re.MULTILINE), encoding="utf-8")

      - name: Установка Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Установка uv и wheel
        run: pip install uv wheel

      - name: Сборка wheel и ретегинг
        working-directory: ./python
        shell: bash
        run: |
          mkdir -p ../dist
          
          # uv соберет wheel с версией python текущего раннера (например, cp312)
          CGO_ENABLED=1 TARGET_ARCH="${{ matrix.platform.arch }}" \
          uv build --wheel --out-dir ../dist --package py-fake-useragent

          cd ../dist
          
          # Безопасно меняем теги и удаляем исходные файлы (вместо огромного Python-скрипта)
          for whl_file in *.whl; do
            wheel tags --python-tag py3 --abi-tag none "$whl_file"
            rm "$whl_file"
          done
          
          ls -l

      - uses: actions/upload-artifact@v6
        with:
          name: python-package-wheel-${{ matrix.platform.plat }}
          path: dist/*.whl

  publish-to-pypi:
    name: Выгрузка на PyPI
    needs: [prepare, build-wheels-manylinux, build-wheels-musllinux, build-wheels-other]
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags')) || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v6
        with:
          pattern: python-package-wheel-*
          path: dist
          merge-multiple: true

      - name: Проверка собранных пакетов
        run: ls -R dist

      - name: Публикация на PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}