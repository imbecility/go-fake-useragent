name: Build and publish Python distributions to PyPI

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  prepare:
    name: получение версии релиза
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: проверка репозитория
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: определение строки с версией
        id: get_version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            echo "активируется при отправке тега, используется версия из тега: $VERSION"
          else
            echo "запущено вручную, поиск последнего тега в git..."
            VERSION=$(git describe --tags --abbrev=0)
            echo "найден последний тег: $VERSION"
          fi
          CLEAN_VERSION=${VERSION#v}
          echo "очищенная версия: $CLEAN_VERSION"
          echo "version=$CLEAN_VERSION" >> "$GITHUB_OUTPUT"

  build-wheels-manylinux:
    name: сборка под manylinux
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: проверка репозитория
        uses: actions/checkout@v6

      - name: сборка в контейнере manylinux
        env:
          PACKAGE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          docker run --rm \
            -v "$(pwd)":/workdir \
            -e PACKAGE_VERSION \
            quay.io/pypa/manylinux2014_x86_64 /bin/bash -c '
              set -eux

              echo "--- установка версии ---"
              sed -i "s/^version = .*/version = \"$PACKAGE_VERSION\"/" /workdir/python/pyproject.toml

              echo "--- установка Go ---"
              yum install -y curl
              curl -sL https://go.dev/dl/go1.26.4.linux-amd64.tar.gz | tar -C /usr/local -xzf -
              export PATH=$PATH:/usr/local/go/bin

              echo "--- установка uv и wheel ---"
              /opt/python/cp310-cp310/bin/pip install uv wheel

              mkdir -p /workdir/dist

              echo "--- сборка сырого wheel ---"
              CGO_ENABLED=1 TARGET_ARCH="x86_64" \
              /opt/python/cp310-cp310/bin/uv build \
                --wheel \
                --python "/opt/python/cp310-cp310/bin/python" \
                --out-dir /workdir/dist \
                --package py-fake-useragent \
                /workdir/python

              cd /workdir/dist
              ORIG_WHL=$(ls py_fake_useragent-*-cp310-cp310-linux_x86_64.whl 2>/dev/null | head -n 1)

              if [ -z "$ORIG_WHL" ]; then
                echo "Ошибка: Исходный wheel не найден!"
                exit 1
              fi

              echo "--- repair через auditwheel ---"
              auditwheel repair "$ORIG_WHL" --plat manylinux2014_x86_64 -w /workdir/dist/

              echo "--- удаление сырого файла ---"
              rm "$ORIG_WHL"

              echo "--- перепаковка через wheel tags ---"
              mkdir -p /workdir/dist/tmp_tagged
              for whl_file in py_fake_useragent-*-cp310-cp310-manylinux*.whl; do
                if [ -f "$whl_file" ]; then
                  /opt/python/cp310-cp310/bin/python -m wheel tags \
                    --python-tag py3 \
                    --abi-tag none \
                    --output-dir /workdir/dist/tmp_tagged \
                    "$whl_file"
                  rm "$whl_file"
                  echo "Перепакован: $whl_file"
                fi
              done
              mv /workdir/dist/tmp_tagged/*.whl /workdir/dist/
              rm -rf /workdir/dist/tmp_tagged

              echo "--- итоговое содержимое dist ---"
              ls -l /workdir/dist/
            '

      - name: сохранение пакетов
        uses: actions/upload-artifact@v6
        with:
          name: python-package-wheel-manylinux
          path: dist/*.whl

  build-wheels-musllinux:
    name: сборка под musllinux
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: проверка репозитория
        uses: actions/checkout@v6

      - name: сборка в контейнере musllinux
        env:
          PACKAGE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          docker run --rm \
            -v "$(pwd)":/workdir \
            -e PACKAGE_VERSION \
            quay.io/pypa/musllinux_1_1_x86_64 /bin/bash -c '
              set -eux

              echo "--- установка версии ---"
              sed -i "s/^version = .*/version = \"$PACKAGE_VERSION\"/" /workdir/python/pyproject.toml

              echo "--- установка Go ---"
              apk add --no-cache curl build-base
              curl -sL https://go.dev/dl/go1.25.0.linux-amd64.tar.gz | tar -C /usr/local -xzf -
              export PATH=$PATH:/usr/local/go/bin

              echo "--- установка uv и wheel ---"
              /opt/python/cp310-cp310/bin/pip install uv wheel

              mkdir -p /workdir/dist

              echo "--- сборка сырого wheel ---"
              CGO_ENABLED=1 TARGET_ARCH="x86_64" \
              /opt/python/cp310-cp310/bin/uv build \
                --wheel \
                --python "/opt/python/cp310-cp310/bin/python" \
                --out-dir /workdir/dist \
                --package py-fake-useragent \
                /workdir/python

              cd /workdir/dist
              ORIG_WHL=$(ls py_fake_useragent-*-cp310-cp310-linux_x86_64.whl 2>/dev/null | head -n 1)

              if [ -z "$ORIG_WHL" ]; then
                echo "Ошибка: Исходный wheel не найден!"
                exit 1
              fi

              echo "--- repair через auditwheel ---"
              auditwheel repair "$ORIG_WHL" --plat musllinux_1_1_x86_64 -w /workdir/dist/

              echo "--- удаление сырого файла ---"
              rm "$ORIG_WHL"

              echo "--- перепаковка через wheel tags ---"
              mkdir -p /workdir/dist/tmp_tagged
              for whl_file in py_fake_useragent-*-cp310-cp310-musllinux*.whl; do
                if [ -f "$whl_file" ]; then
                  /opt/python/cp310-cp310/bin/python -m wheel tags \
                    --python-tag py3 \
                    --abi-tag none \
                    --output-dir /workdir/dist/tmp_tagged \
                    "$whl_file"
                  rm "$whl_file"
                  echo "Перепакован: $whl_file"
                fi
              done
              mv /workdir/dist/tmp_tagged/*.whl /workdir/dist/
              rm -rf /workdir/dist/tmp_tagged

              echo "--- итоговое содержимое dist ---"
              ls -l /workdir/dist/
            '

      - name: сохранение пакетов
        uses: actions/upload-artifact@v6
        with:
          name: python-package-wheel-musllinux
          path: dist/*.whl

  build-wheels-other:
    name: сборка под ${{ matrix.platform.plat }}
    needs: prepare
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: windows-latest
            plat: win_amd64
            arch: amd64
          - os: macos-14
            plat: macosx_x86_64
            arch: x86_64
          - os: macos-14
            plat: macosx_arm64
            arch: arm64
    steps:
      - name: проверка репозитория
        uses: actions/checkout@v6

      - name: установка версии в pyproject.toml
        shell: python
        env:
          PYTHONUTF8: 1
          PYTHONIOENCODING: 'UTF-8'
        run: |
          import re
          from pathlib import Path
          version = "${{ needs.prepare.outputs.version }}"
          pyproject_path = Path("python/pyproject.toml")
          content = pyproject_path.read_text(encoding="utf-8")
          new_content = re.sub(r'^version\s*=\s*".*"', f'version = "{version}"', content, count=1, flags=re.MULTILINE)
          pyproject_path.write_text(new_content, encoding="utf-8")

      - name: установка Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: установка зависимостей
        run: pip install uv wheel

      - name: сборка wheel
        env:
          PYTHONUTF8: 1
          PYTHONIOENCODING: 'UTF-8'
        working-directory: ./python
        shell: bash
        run: |
          mkdir -p ../dist
          ARCH="${{ matrix.platform.arch }}"

          echo "--- сборка под $ARCH ---"
          CGO_ENABLED=1 TARGET_ARCH="$ARCH" uv build \
            --wheel \
            --out-dir ../dist \
            --package py-fake-useragent

          echo "--- исходные файлы ---"
          ls -l ../dist

      - name: перепаковка wheel с корректными тегами
        shell: python
        env:
          PYTHONUTF8: 1
          PYTHONIOENCODING: 'UTF-8'
        run: |
          import os
          import sys
          import glob
          import shutil
          import subprocess
          from pathlib import Path

          dist_dir = Path("dist")
          plat = "${{ matrix.platform.plat }}"
          wheels = list(dist_dir.glob("*.whl"))

          if not wheels:
              print("Ошибка: wheel-файлы не найдены!")
              sys.exit(1)

          for whl in wheels:
              print(f"Обрабатывается: {whl.name}")

              tmp_dir = dist_dir / "tmp_tagged"
              tmp_dir.mkdir(exist_ok=True)

              result = subprocess.run(
                  [
                      sys.executable, "-m", "wheel", "tags",
                      "--python-tag", "py3",
                      "--abi-tag", "none",
                      "--platform-tag", plat,
                      "--output-dir", str(tmp_dir),
                      str(whl),
                  ],
                  capture_output=True,
                  text=True,
              )

              print(result.stdout)
              if result.returncode != 0:
                  print(f"Ошибка wheel tags:\n{result.stderr}")
                  sys.exit(1)

              whl.unlink()

              new_wheels = list(tmp_dir.glob("*.whl"))
              if not new_wheels:
                  print("Ошибка: перепакованный wheel не найден!")
                  sys.exit(1)

              for new_whl in new_wheels:
                  dest = dist_dir / new_whl.name
                  shutil.move(str(new_whl), str(dest))
                  print(f"Готов: {dest.name}")

              shutil.rmtree(tmp_dir)

          print("\n--- итоговые файлы ---")
          for f in sorted(dist_dir.glob("*.whl")):
              print(f"  {f.name}  ({f.stat().st_size:,} bytes)")

      - name: сохранение пакетов
        uses: actions/upload-artifact@v6
        with:
          name: python-package-wheel-${{ matrix.platform.plat }}
          path: dist/*.whl

  publish-to-pypi:
    name: выгрузка и опубликование пакетов на PyPI
    needs: [prepare, build-wheels-manylinux, build-wheels-musllinux, build-wheels-other]
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags')) || github.event_name == 'workflow_dispatch'
    steps:
      - name: скачивание всех сборок пакетов
        uses: actions/download-artifact@v6
        with:
          pattern: python-package-wheel-*
          path: dist
          merge-multiple: true

      - name: список сборок
        run: ls -R dist

      - name: публикация на PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}